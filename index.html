<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="8mKKbb6fSTRjQfIZgNCOUv-37rLhBDn8HHnDLPNA05Q">
    <title>Emisora Cristiana</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 60px; background-color: #f4f4f9; }
    
    .reproductor-oculto { display: none; }

    /* Estilos del reproductor */
    #contenedor-radio {
      background: white;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    #info-cancion { font-size: 22px; font-weight: bold; color: #222; margin-bottom: 5px; }
    #senal-estado { font-size: 14px; color: #666; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
    .reproduciendo { color: #ff5500 !important; font-weight: bold; }

    /* Botones */
    .btn-audio { 
      padding: 15px 25px; font-size: 16px; margin: 5px; cursor: pointer; 
      border: none; border-radius: 25px; background-color: #ddd; color: #333;
      font-weight: bold; transition: all 0.3s;
    }
    .btn-activo { background-color: #ff5500; color: white; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.4); }
    .btn-audio:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
  </head>
  <body>
  <h1>Emisora Cristiana</h1>
  <div id="contenedor-radio">
    <div id="info-cancion">Sintonizando emisora...</div>
    <div id="senal-estado">Cargando...</div>

    <iframe 
      id="reproductor-sc" 
      class="reproductor-oculto"
      allow="autoplay" 
      src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A314555386&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
    </iframe>

    <div id="reproductor-yt" class="reproductor-oculto"></div>

    <button id="btnPlay" class="btn-audio" onclick="reproducirMix()" disabled>▶ Play</button>
    <button id="btnPause" class="btn-audio" onclick="pausarMix()" disabled>⏸ Pausa</button>
    <button id="btnNext" class="btn-audio" onclick="siguienteCancion()" disabled>⏭ Siguiente</button>
  </div>

  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    // PLAYLIST MIXTA: Mantiene tus URLs completas de SoundCloud intactas y soporta IDs de YouTube
    const emisoraPlaylist = [
      { tipo: 'sc', url: "https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A314555386&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true" }, // Canción 1 (SC)
      { tipo: 'yt', url: "q1SxbBtXLkw" }, // Canción 2 (YouTube ID)
      { tipo: 'sc', url: "https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A212951874&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true" }, // Canción 3 (SC)
      { tipo: 'yt', url: "RElljP4oWgk" }, // Canción 4 (YouTube ID)
      { tipo: 'sc', url: "https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A222100771&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true" }  // Canción 5 (SC)
    ];
    
    let indiceActual = 0;
    let ytPlayer = null;
    let apiScLista = false;
    let apiYtLista = false;

    const iframeElement = document.getElementById('reproductor-sc');
    const btnPlay = document.getElementById('btnPlay');
    const btnPause = document.getElementById('btnPause');
    const btnNext = document.getElementById('btnNext');
    const infoCancion = document.getElementById('info-cancion');
    const senalEstado = document.getElementById('senal-estado');
    
    const widget = SC.Widget(iframeElement);

    function leerDatosYActivar(estadoTexto = "Listo") {
      widget.getCurrentSound(function(sound) {
        if (sound && sound.title) {
          infoCancion.innerText = sound.title;
          senalEstado.innerText = estadoTexto;
          desbloquearBotones();
        }
      });
    }

    // --- APIS READY ---
    widget.bind(SC.Widget.Events.READY, function() {
      apiScLista = true;
      verificarSistemas();
    });

    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('reproductor-yt', {
        height: '0', width: '0', videoId: '',
        playerVars: { 'playsinline': 1, 'disablekb': 1 },
        events: {
          'onReady': () => {
            apiYtLista = true;
            verificarSistemas();
          },
          'onStateChange': onYoutubeStateChange
        }
      });
    }

    function verificarSistemas() {
      if (apiScLista && apiYtLista) {
        // Inicializa el primer track sin forzar reproducción
        if (emisoraPlaylist[indiceActual].tipo === 'sc') {
          leerDatosYActivar("Listo para iniciar");
        }
      }
    }

    // --- MANEJO DE EVENTOS (SOUNDCLOUD) ---
    widget.bind(SC.Widget.Events.FINISH, function() {
      if (emisoraPlaylist[indiceActual].tipo === 'sc') siguienteCancion();
    });

    widget.bind(SC.Widget.Events.PLAY, function() {
      if (emisoraPlaylist[indiceActual].tipo !== 'sc') return;
      senalEstado.innerText = "En el aire 🌐";
      senalEstado.classList.add('reproduciendo');
      btnPlay.classList.add('btn-activo');
      btnPause.classList.remove('btn-activo');
    });

    widget.bind(SC.Widget.Events.PAUSE, function() {
      if (emisoraPlaylist[indiceActual].tipo !== 'sc') return;
      senalEstado.innerText = "Transmisión en pausa";
      senalEstado.classList.remove('reproduciendo');
      btnPause.classList.add('btn-activo');
      btnPlay.classList.remove('btn-activo');
    });

    // --- MANEJO DE EVENTOS (YOUTUBE) ---
    function onYoutubeStateChange(event) {
      if (emisoraPlaylist[indiceActual].tipo !== 'yt') return;

      if (event.data === YT.PlayerState.PLAYING) {
        infoCancion.innerText = ytPlayer.getVideoData().title || "Video de YouTube";
        senalEstado.innerText = "En el aire 🌐";
        senalEstado.classList.add('reproduciendo');
        btnPlay.classList.add('btn-activo');
        btnPause.classList.remove('btn-activo');
        desbloquearBotones();
      } 
      else if (event.data === YT.PlayerState.PAUSED) {
        senalEstado.innerText = "Transmisión en pausa";
        senalEstado.classList.remove('reproduciendo');
        btnPause.classList.add('btn-activo');
        btnPlay.classList.remove('btn-activo');
      } 
      else if (event.data === YT.PlayerState.ENDED) {
        siguienteCancion();
      }
    }

    // --- CONTROLES GLOBALES ---
    function reproducirMix() {
      const track = emisoraPlaylist[indiceActual];
      if (track.tipo === 'sc') widget.play();
      if (track.tipo === 'yt') ytPlayer.playVideo();
    }

    function pausarMix() {
      const track = emisoraPlaylist[indiceActual];
      if (track.tipo === 'sc') widget.pause();
      if (track.tipo === 'yt') ytPlayer.pauseVideo();
    }

    function siguienteCancion() {
      bloquearBotones();
      
      senalEstado.innerText = "Sintonizando...";
      infoCancion.innerText = "Cargando pista...";

      indiceActual = (indiceActual + 1) % emisoraPlaylist.length;
      const proximoTrack = emisoraPlaylist[indiceActual];

      if (proximoTrack.tipo === 'sc') {
        if(ytPlayer) ytPlayer.pauseVideo(); // Callar YouTube

        // TRUCO EXTRACCIÓN: Como mantienes tu URL original, filtramos la llamada interna para evitar bugs
        let urlLimpia = proximoTrack.url;
        const match = proximoTrack.url.match(/url=(.*?)&/);
        if (match && match[1]) {
          urlLimpia = decodeURIComponent(match[1]).replace('soundcloud:tracks:', '');
        }

        widget.load(urlLimpia, {
          auto_play: true,
          callback: function() {
            setTimeout(function() {
              leerDatosYActivar("En el aire 🌐");
            }, 600);
          }
        });
      } 
      else if (proximoTrack.tipo === 'yt') {
        widget.pause(); // Callar SoundCloud
        ytPlayer.loadVideoById(proximoTrack.url);
      }
    }

    // --- AUXILIARES UI ---
    function bloquearBotones() {
      btnPlay.disabled = true; btnPause.disabled = true; btnNext.disabled = true;
    }

    function desbloquearBotones() {
      btnPlay.disabled = false; btnPause.disabled = false; btnNext.disabled = false;
    }
  </script>
  </body>
</html>
